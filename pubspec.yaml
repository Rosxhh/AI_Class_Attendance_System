name: ai_class_attendance_system
description: A production-grade Smart AI Attendance Platform for schools.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # ---------------- STATE MANAGEMENT ----------------
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---------------- FIREBASE ----------------
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.2

  # ---------------- AI / CAMERA ----------------
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.11.0
  image_picker: ^1.1.0
  image: ^4.2.0

  # ---------------- UI ----------------
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0

  # ---------------- UTILITIES ----------------
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  file_picker: ^8.0.3
  excel: ^4.0.3
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

  # Riverpod Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/